apiVersion: batch/v1
kind: Job
metadata:
  name: presync-hook
  namespace: application
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      containers:
      - name: presync-hook
        image: busybox
        command: ["sh", "-c", "echo 'Running PreSync Hook'; sleep 5"] # we can perform any necessary setup tasks here
      restartPolicy: Never